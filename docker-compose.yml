services:
  nginx:
    image: nginx:alpine
    container_name: catalog_nginx
    ports:
      - "80:80"
    volumes:
      - ./public:/var/www/public:ro
      - ./nginx/site.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks:
      - catalog_net

  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: catalog_php
    volumes:
      - .:/var/www
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=catalog
      - DB_USER=catalog_user
      - DB_PASSWORD=FSY3hWw3NQJt
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SMTP_HOST=smtp.example.com
      - SMTP_PORT=587
      - SMTP_USER=noreply@homecatalog.ru
      - SMTP_PASS=
      - SMTP_ENCRYPTION=tls
      - APP_DEBUG=true
    depends_on:
      - postgres
      - redis
    networks:
      - catalog_net

  postgres:
    image: postgres:18
    container_name: catalog_postgres
    environment:
      POSTGRES_DB: catalog
      POSTGRES_USER: catalog_user
      POSTGRES_PASSWORD: FSY3hWw3NQJt
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
      - ./migrations:/docker-entrypoint-initdb.d
    networks:
      - catalog_net

  redis:
    image: redis:7-alpine
    container_name: catalog_redis
    ports:
      - "6379:6379"
    networks:
      - catalog_net

volumes:
  pgdata:

networks:
  catalog_net:
    driver: bridge
