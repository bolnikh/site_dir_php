server {
    listen 80;
    server_name homecatalog.local localhost;
    root /var/www/public;
    index index.php;

    # Основной обработчик — все запросы через фронт-контроллер
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ЧПУ: /section/slug → index.php?page=section&slug=slug
    location ~ ^/section/([a-z0-9-]+)$ {
        rewrite ^/section/([a-z0-9-]+)$ /index.php?page=section&slug=$1 last;
    }

    # ЧПУ: /site/slug → index.php?page=site&slug=slug
    location ~ ^/site/([a-z0-9-]+)$ {
        rewrite ^/site/([a-z0-9-]+)$ /index.php?page=site&slug=$1 last;
    }

    # Статические страницы
    location = /about {
        rewrite ^ /index.php?page=about last;
    }

    location = /rules {
        rewrite ^ /index.php?page=rules last;
    }

    location = /add {
        rewrite ^ /index.php?page=add last;
    }

    # Модератор
    location = /moderator {
        return 301 /moderator/list;
    }

    location ~ ^/moderator/ {
        rewrite ^/moderator/(.*)$ /index.php?page=moderator/$1 last;
    }

    # PHP-FPM
    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Защита скрытых файлов
    location ~ /\.ht {
        deny all;
    }

    # Защита конфигов и исходников
    location ~ ^/(config|src|helpers|templates|migrations|vendor)/ {
        deny all;
    }

    # Статические файлы — кэширование на 30 дней
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
